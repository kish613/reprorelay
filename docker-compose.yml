services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reprorelay
      POSTGRES_PASSWORD: reprorelay
      POSTGRES_DB: reprorelay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reprorelay -d reprorelay"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: reprorelay
      MINIO_ROOT_PASSWORD: reprorelay-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 reprorelay reprorelay-secret; do sleep 1; done;
      mc mb -p local/reprorelay;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://reprorelay:reprorelay@postgres:5432/reprorelay
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - "4000:4000"

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment:
      VITE_REPRORELAY_API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "5173:8080"

volumes:
  postgres_data:
  minio_data:

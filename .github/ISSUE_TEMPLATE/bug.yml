name: Bug report
description: Report a reproducible problem in ReproRelay
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include credentials, customer evidence, or other private data. Report vulnerabilities through the private security link instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "@reprorelay/browser-sdk 0.6.0 or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Browser SDK
        - React package
        - API
        - Worker
        - Dashboard
        - Deployment or storage adapter
        - Documentation
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest safe reproduction and the expected and actual behaviour.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include browser, Node version, deployment model, and storage driver where relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or screenshots
      description: Remove tokens, personal data, report evidence, and private URLs before attaching anything.
